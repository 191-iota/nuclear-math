<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif">
<rect x="0" y="0" width="880" height="300" rx="14" fill="#f4f4f1" stroke="none" stroke-width="0"/>
<text x="40" y="36" text-anchor="start" font-size="13" fill="#c39a27" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="600" letter-spacing="0.05em">THE CORNER MARK IS THE TRIGGER</text>
<rect x="40" y="74" width="300" height="54" rx="10" fill="#ffffff" stroke="#e3e2db" stroke-width="1.4"/>
<text x="190" y="107" text-anchor="middle" font-size="17" fill="#1a1915" font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif" font-style="italic">x² + 5x + 4 = 0</text>
<line x1="352" y1="101" x2="452" y2="101" stroke="#bdb9af" stroke-width="1.6"/><path d="M452 101 L445 97 L445 105 Z" fill="#bdb9af"/>
<text x="402" y="90" text-anchor="middle" font-size="11.5" fill="#6b6b66" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace">no mark</text>
<rect x="464" y="74" width="376" height="54" rx="10" fill="#ffffff" stroke="#6b6b66" stroke-width="1.3" stroke-dasharray="2 5"/>
<circle cx="486" cy="101" r="3" fill="#6b6b66"/>
<text x="502" y="106" text-anchor="start" font-size="14" fill="#6b6b66" font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif">silent, it just tracks your progress</text>
<rect x="40" y="172" width="300" height="54" rx="10" fill="#ffffff" stroke="#e3e2db" stroke-width="1.4"/>
<text x="168" y="205" text-anchor="middle" font-size="17" fill="#1a1915" font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif" font-style="italic">x = -1,  x = -4</text>
<path d="M300 192 L300 214 L322 214" fill="none" stroke="#c39a27" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
<line x1="352" y1="199" x2="452" y2="199" stroke="#c39a27" stroke-width="1.6"/><path d="M452 199 L445 195 L445 203 Z" fill="#c39a27"/>
<text x="402" y="188" text-anchor="middle" font-size="11.5" fill="#c39a27" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace">corner mark</text>
<rect x="464" y="172" width="376" height="54" rx="10" fill="#ffffff" stroke="#c39a27" stroke-width="1.8"/>
<circle cx="486" cy="199" r="3.2" fill="#c39a27"/>
<text x="504" y="194" text-anchor="start" font-size="12.5" fill="#1a1915" font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif">wrong: it speaks the first-step correction</text>
<text x="504" y="212" text-anchor="start" font-size="12.5" fill="#1a1915" font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif">right: it says “Correct.” and never marks it</text>
<text x="440.0" y="286" text-anchor="middle" font-size="12.5" fill="#6b6b66" font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif">you draw the corner to ask for a look, so nothing interrupts until you want it</text>
</svg>
