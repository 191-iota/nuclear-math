<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 258" font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif">
<rect width="880" height="258" rx="14" fill="#16150f"/>
<text x="40" y="36" font-size="13" fill="#d8b24a" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="600" letter-spacing="0.04em">THE CORRECTION GRACE</text>
<line x1="70" y1="120" x2="440" y2="120" stroke="#2e2b20" stroke-width="2"/>
<circle cx="100" cy="120" r="5" fill="#d27f62"/>
<text x="100" y="86" text-anchor="middle" font-size="12.5" fill="#ece9dd">a wrong step settles</text>
<circle cx="300" cy="120" r="6.5" fill="none" stroke="#d8b24a" stroke-width="2.5"/>
<text x="300" y="86" text-anchor="middle" font-size="12.5" fill="#ece9dd">the scan sees it — held, silent</text>
<text x="300" y="148" text-anchor="middle" font-size="10.5" fill="#9b988a" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace">on screen, not spoken</text>
<path d="M440,120 C480,120 480,72 520,72" fill="none" stroke="#2e2b20" stroke-width="2"/>
<path d="M440,120 C480,120 480,168 520,168" fill="none" stroke="#2e2b20" stroke-width="2"/>
<circle cx="536" cy="72" r="5" fill="#d8b24a"/>
<text x="552" y="66"><tspan font-size="12.5" fill="#ece9dd">you catch it yourself and strike it through</tspan></text>
<text x="552" y="84" font-size="12.5" fill="#d8b24a">never spoken</text>
<circle cx="536" cy="168" r="5" fill="#ece9dd"/>
<text x="552" y="162" font-size="12.5" fill="#ece9dd">it survives your next pause, or twenty idle seconds</text>
<text x="552" y="180" font-size="12.5" fill="#9b988a">one sentence, once</text>
<text x="70" y="238" font-size="10.5" fill="#9b988a" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace">a final-marked result skips the wait — the double underline means you are waiting · the window is the correction grace setting</text>
</svg>