<text x="48" y="248" text-anchor="start" font-size="12.5" fill="#9b988a" font-family="'IBM Plex Sans', system-ui, -apple-system, sans-serif">it climbs on a clean solve, fades as a skill goes stale, and stays provisional until enough problems have run through it.</text>
